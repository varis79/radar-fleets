name: Weekly freshness rotation

# Cada miércoles a las 06:00 UTC (08:00 Madrid / 00:00 CDMX)
# Refresca ~30 páginas (rotación 6 semanas) + rota cajas "Sabías qué" en todas.
# Hace que Google vea actividad real entre ediciones de magazine.

on:
  schedule:
    - cron: '0 6 * * 3'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install beautifulsoup4 lxml pyyaml

      - name: Rotate "Sabías qué" boxes
        run: python3 scripts/rotate_facts.py

      - name: Refresh freshness meta (rotation cycle)
        run: python3 scripts/refresh_freshness.py

      - name: Rebuild sitemap
        run: python3 scripts/rebuild_sitemap.py

      - name: Commit & push if changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No freshness changes this week"
            exit 0
          fi
          WEEK=$(date +%V)
          git commit -m "chore(freshness): rotación semanal W${WEEK} — facts + meta refresh

          Auto-generado por weekly-freshness workflow.
          Cambios: cajas 'Sabías qué' rotadas, ~30 páginas con article:modified_time
          actualizado, sitemap regenerado con lastmod real."
          git push

      - name: Trigger Vercel deploy
        if: success()
        run: |
          if [ -n "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
          fi
