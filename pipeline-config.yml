# The Fleet Radar · pipeline-config.yml
#
# Parametrización del MVP autónomo. Cambios aquí no requieren tocar scripts.
# Todos los scripts del pipeline leen este fichero vía scripts/lib/config.py.

# ─────────────────────────────────────────────
# Identidad
# ─────────────────────────────────────────────
site:
  name: "The Fleet Radar · by Pulpo"
  domain: "https://thefleetradar.com"
  locale: "es-ES"
  timezone: "Europe/Madrid"
  slug_prefix: "radar-fleet-by-pulpo"   # mantenido por compatibilidad con URLs ya indexadas

# ─────────────────────────────────────────────
# Cadencia
# ─────────────────────────────────────────────
cadence:
  day: "monday"          # publicación semanal
  hour_local: "07:00"
  next_edition_number_source: "archive"   # se lee de archive.html contando filas

# ─────────────────────────────────────────────
# Fuentes de ingesta
# Mezcla USA / Europa / España / México / Global EV.
# Cada fuente tiene geo principal y topic hint opcional.
#
# Histórico:
#   2026-05-21 — auditoría: 6/10 fuentes RSS estaban rotas. Arreglamos FleetOwner
#   y Electrek, eliminamos las que ya no exponen RSS (Trans.info, Transporte
#   Profesional, TyT MX, Fleet News UK por Cloudflare) y ampliamos cobertura USA
#   con Transport Topics, Trucking Dive, Supply Chain Dive, Smart Cities Dive,
#   Inside EVs, CleanTechnica. Para España añadimos AECOC, para México
#   Mundo Logístico.
# ─────────────────────────────────────────────
sources:
  # ── USA + global ───────────────────────────
  - name: "FleetOwner"
    url: "https://www.fleetowner.com/__rss/website-scheduled-content.xml?input=%7B%22sectionAlias%22%3A%22home%22%7D"
    geo: "usa"
    lang: "en"
  - name: "FreightWaves"
    url: "https://www.freightwaves.com/news/feed"
    geo: "usa"
    lang: "en"
  - name: "Transport Topics"
    url: "https://www.ttnews.com/rss.xml"
    geo: "usa"
    lang: "en"
  - name: "Trucking Dive"
    url: "https://www.truckingdive.com/feeds/news/"
    geo: "usa"
    lang: "en"
  - name: "Supply Chain Dive"
    url: "https://www.supplychaindive.com/feeds/news/"
    geo: "usa"
    lang: "en"
  - name: "Smart Cities Dive"
    url: "https://www.smartcitiesdive.com/feeds/news/"
    geo: "usa"
    lang: "en"
    topic_hint: "movilidad-urbana"
  - name: "Electrek"
    url: "https://electrek.co/feed/"
    geo: "usa"
    lang: "en"
    topic_hint: "electrificacion-flotas"

  # ── Europa / EU ────────────────────────────
  - name: "Transport & Energy"
    url: "https://transportandenergy.com/feed/"
    geo: "europa"
    lang: "en"
    topic_hint: "electrificacion-flotas"

  # ── España ────────────────────────────────
  - name: "Fleet People ES"
    url: "https://fleetpeople.es/feed/"
    geo: "espana"
    lang: "es"
  - name: "AECOC"
    url: "https://www.aecoc.es/feed/"
    geo: "espana"
    lang: "es"
    topic_hint: "logistica-distribucion"

  # ── México ────────────────────────────────
  - name: "T21 MX"
    url: "https://t21.com.mx/feed"
    geo: "mexico"
    lang: "es"
  - name: "Mundo Logístico MX"
    url: "https://www.mundologistico.net/feed/"
    geo: "mexico"
    lang: "es"
    topic_hint: "logistica-distribucion"

  # ── Global EV / movilidad limpia ─────────
  - name: "Inside EVs"
    url: "https://insideevs.com/rss/articles/all/"
    geo: "global"
    lang: "en"
    topic_hint: "electrificacion-flotas"
  - name: "CleanTechnica · Clean Transport"
    url: "https://cleantechnica.com/category/clean-transport-2/feed/"
    geo: "global"
    lang: "en"
    topic_hint: "electrificacion-flotas"

# Ventana temporal considerada por ejecución (días hacia atrás)
ingest:
  lookback_days: 8
  user_agent: "Mozilla/5.0 (compatible; TheFleetRadarBot/1.0; +https://thefleetradar.com)"
  timeout_seconds: 20
  max_items_per_source: 30

# Dominios en blocklist (no se ingesta nada desde aquí)
blocklist_domains:
  - example.com
  - pinterest.com

# ─────────────────────────────────────────────
# Clasificación
# Mapeo keyword -> {topic, market, fleet_type, micro_tags}
# Determinístico. Reglas explícitas, sin LLM.
#
# Histórico:
#   2026-05-21 — añadidos topics dominantes en USA (autonomous-trucking,
#   freight-market, rail-freight, labor-shortage, tariffs-trade, truck-oem,
#   cargo-theft, movilidad-urbana, logistica-distribucion) y ampliadas
#   keywords EN en topics existentes.
# ─────────────────────────────────────────────
