# 14 casos de uso Pulpo / PulpoPay
#
# Fuente: documentación interna de Pulpo (varis@getpulpo.com, sesión 2026-05-22).
# Cada caso define el segmento operativo de una flota; el sistema genera una
# página pilar por caso × mercado activo, alimentada con clientes Pulpo reales
# del mercado y referencias editoriales.
#
# Estructura por caso:
#   code: slug del caso
#   label: nombre humano (corto)
#   icon: emoji semántico
#   sectors: sectores típicos
#   how_they_operate: descripción operativa breve
#   pain_points: dolores que Pulpo resuelve
#   pulpo_modules: módulos Pulpo (SaaS administración / mantenimiento)
#   pulpopay_modules: módulos PulpoPay
#   product_priority: pulpo | pulpopay | both
#   demo_focus: enfoque editorial de la demo
#   not_for_them: cosas que NO les interesan (para evitar confundir scope)
#   client_references_mx: clientes Pulpo reales en MX (📒=admin, 🛠️=mantenimiento, 💳=PulpoPay)
#   client_references_es: clientes Pulpo reales en ES
#   tier_modifier: 0 si caso fundamental, 1+ si más nicho

use_cases:
  - code: vehiculos-directivos
    label: "Vehículos directivos y ejecutivos"
    icon: 🤵
    sectors: ["multinacionales", "banca", "pharma", "consumo", "tecnología", "grandes corporativos"]
    how_they_operate: "Bajo kilometraje, uso mixto profesional-personal, mayoritariamente renting o leasing."
    pain_points:
      - "Desorden administrativo"
      - "Poca visibilidad del coste total por vehículo"
      - "Dificultad para separar gasto personal y profesional"
      - "Vencimientos olvidados"
    pulpo_modules:
      - "Gestión documental y vencimientos"
      - "Control de contratos de renting/leasing"
      - "Coste total por vehículo"
    pulpopay_modules:
      - "Cobertura total"
      - "Límites suaves por categoría"
      - "Separación clara de gasto"
      - "Reporting automático a finanzas"
    product_priority: pulpo
    demo_focus: "Visibilidad financiera y orden sin fricción"
    not_for_them: "Control de fraude, mantenimiento, controles exhaustivos"
    client_references_mx:
      - "Banorte (📒)"
      - "Sherwin Williams (📒)"
      - "Seguros Atlas (📒🛠️)"
      - "Tip (📒💳)"
    client_references_es:
      - "Chubb (📒)"
    tier_modifier: 0

