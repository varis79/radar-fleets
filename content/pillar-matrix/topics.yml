# Topics que la matriz cruza con mercados.
#
# applies_to_markets:
#   "*"       → todos los mercados activos
#   ["mexico"] → solo México
#   ["mexico", "espana"] → solo MX y ES
#   prefix "exclude:" → todos EXCEPTO los listados (ej. "exclude:usa")
#
# intents: qué intents se generan para este topic.
#   Cada intent produce una página distinta. NO todas las combinaciones
#   topic+intent tienen sentido (un topic regulatorio no admite "comparativo").
#
# tier_modifier: cuando una combinación market+topic se calcula, este modifier
#   se suma al tier base del mercado. Positivo = degrada (T1→T2); 0 = neutro.
#
# pulpopay_relevant: true si el topic naturalmente conecta con PulpoPay
#   (fuel-cards, control-gasto, combustible, pagos). El renderer añadirá un
#   slot dedicado a PulpoPay en estas páginas.
#
# slug_template: cómo se nombra la URL para este topic.
#   {market_slug}, {year} se sustituyen.

topics:
  # ─── Core operativo (aplica en todos los mercados) ──────────
  - code: telematica
    slug_template: "telematica-flotas-{market_slug}-{year}"
    label_template: "Telemática para flotas en {market_label} {year}"
    applies_to_markets: "*"
    intents: [informational, comparativo, guia-practica]
    tier_modifier: 0
    pulpopay_relevant: false
    notes: "Topic core. Aplica en todos los mercados con matices."

